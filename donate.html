<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অনুদান দিন | SromikBondhu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-emerald-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-wide">SromikBondhu</a>
            <div class="space-x-4">
                <a href="index.html" class="hover:underline font-medium">হোম</a>
                <a href="donate.html" class="bg-yellow-400 text-gray-900 px-4 py-2 rounded-lg font-bold hover:bg-yellow-300 transition">অনুদান দিন</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-12 px-4">
        <div class="max-w-lg mx-auto bg-white p-8 rounded-2xl shadow-lg">
            <h2 class="text-3xl font-bold text-emerald-800 text-center mb-2">সহায়তার হাত বাড়িয়ে দিন</h2>
            <p class="text-gray-500 text-center mb-8">আপনার একটি ছোট অনুদান একজন শ্রমিকের জীবন সহজ করতে পারে।</p>

            <form action="#" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">আপনার নাম</label>
                    <input type="text" placeholder="যেমন: আবির রহমান" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">ইমেইল ঠিকানা</label>
                    <input type="email" placeholder="example@mail.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">অনুদানের পরিমাণ (টাকা)</label>
                    <input type="number" placeholder="৳ ৫০০, ৳ ১০০০, ৳ ৫০০০" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">পেমেন্ট মাধ্যম বেছে নিন</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="border p-3 rounded-lg text-center cursor-pointer hover:bg-emerald-50 block font-bold text-red-500 border-gray-200">
                            <input type="radio" name="payment" class="mr-1" checked> বিকাশ
                        </label>
                        <label class="border p-3 rounded-lg text-center cursor-pointer hover:bg-emerald-50 block font-bold text-orange-500 border-gray-200">
                            <input type="radio" name="payment" class="mr-1"> রকেট
                        </label>
                        <label class="border p-3 rounded-lg text-center cursor-pointer hover:bg-emerald-50 block font-bold text-pink-500 border-gray-200">
                            <input type="radio" name="payment" class="mr-1"> নগদ
                        </label>
                    </div>
                </div>

                <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-emerald-700 transition shadow-md">
                    অনুদানের জন্য এগিয়ে যান
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-6 text-center mt-12">
        <p>&copy; 2026 SromikBondhu. অল রাইটস রিজার্ভড।</p>
    </footer>

</body>
</html>
